<h1>{{trans "Near-Expiry Batches Alert"}}</h1>
<p>{{trans "The following batches are near or past their expiry date:"}}</p>
<table>
    <thead>
        <tr>
            <th>{{trans "Batch ID"}}</th>
            <th>{{trans "Product SKU"}}</th>
            <th>{{trans "Batch Number"}}</th>
            <th>{{trans "Expiry Date"}}</th>
            <th>{{trans "Qty Remaining"}}</th>
        </tr>
    </thead>
    <tbody>
    {{var batches|raw}}
    </tbody>
</table>
